naftiko: 1.0.0-alpha2
info:
  label: Apache Guacamole REST API — Authentication
  description: 'Apache Guacamole REST API — Authentication. 1 operations. Lead operation: Apache Guacamole Create Authentication
    Token. Self-contained Naftiko capability covering one Apache Guacamole business surface.'
  tags:
  - Apache Guacamole
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_GUACAMOLE_API_KEY: APACHE_GUACAMOLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-authentication
    baseUri: http://localhost:8080/guacamole
    description: Apache Guacamole REST API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: api-tokens
      path: /api/tokens
      operations:
      - name: createauthtoken
        method: POST
        description: Apache Guacamole Create Authentication Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Guacamole-Token
      value: '{{env.APACHE_GUACAMOLE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rest-authentication-rest
    port: 8080
    description: REST adapter for Apache Guacamole REST API — Authentication. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/tokens
      name: api-tokens
      description: REST surface for api-tokens.
      operations:
      - method: POST
        name: createauthtoken
        description: Apache Guacamole Create Authentication Token
        call: rest-authentication.createauthtoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache Guacamole REST API — Authentication. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: apache-guacamole-create-authentication-token
      description: Apache Guacamole Create Authentication Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-authentication.createauthtoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
