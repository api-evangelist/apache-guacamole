      path: /api/session/data/{dataSource}/connections
      operations:
      - name: listconnections
        method: GET
        description: Apache Guacamole List Connections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dataSource
          in: path
          type: string
          description: The data source identifier (e.g., postgresql, mysql)
          required: true
        - name: Guacamole-Token
          in: header
          type: string
          description: Authentication token from /api/tokens
