        name: deleteconnection
        description: Apache Guacamole Delete Connection
        call: rest-connections.deleteconnection
        with:
          dataSource: rest.dataSource
          connectionId: rest.connectionId
          Guacamole-Token: rest.Guacamole-Token
        outputParameters:
        - type: object
          mapping: $.
