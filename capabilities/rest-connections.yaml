      name: api-session-data-datasource-connections
      description: REST surface for api-session-data-dataSource-connections.
      operations:
      - method: GET
        name: listconnections
        description: Apache Guacamole List Connections
        call: rest-connections.listconnections
        with:
          dataSource: rest.dataSource
          Guacamole-Token: rest.Guacamole-Token
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createconnection
        description: Apache Guacamole Create Connection
        call: rest-connections.createconnection
        with:
          dataSource: rest.dataSource
          Guacamole-Token: rest.Guacamole-Token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
