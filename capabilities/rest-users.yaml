        - name: dataSource
          in: path
          type: string
          description: The data source identifier
          required: true
        - name: Guacamole-Token
          in: header
          type: string
          description: Authentication token
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-session-data-dataSource-users-username
      path: /api/session/data/{dataSource}/users/{username}
      operations:
      - name: getuser
        method: GET
        description: Apache Guacamole Get User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dataSource
          in: path
          type: string
          description: The data source identifier
          required: true
        - name: username
          in: path
          type: string
          description: The username
          required: true
        - name: Guacamole-Token
          in: header
          type: string
          description: Authentication token
          required: true
      - name: updateuser
        method: PUT
        description: Apache Guacamole Update User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dataSource
          in: path
          type: string
          description: The data source identifier
          required: true
        - name: username
          in: path
          type: string
          description: The username
          required: true
        - name: Guacamole-Token
          in: header
          type: string
          description: Authentication token
