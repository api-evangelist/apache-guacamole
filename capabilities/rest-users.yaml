      description: REST surface for api-session-data-dataSource-users.
      operations:
      - method: GET
        name: listusers
        description: Apache Guacamole List Users
        call: rest-users.listusers
        with:
          dataSource: rest.dataSource
          Guacamole-Token: rest.Guacamole-Token
        outputParameters:
        - type: object
          mapping: $.
