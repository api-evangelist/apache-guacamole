naftiko: 1.0.0-alpha2
info:
  label: Apache Guacamole REST API — Active Connections
  description: 'Apache Guacamole REST API — Active Connections. 1 operations. Lead operation: Apache Guacamole List Active
    Connections. Self-contained Naftiko capability covering one Apache Guacamole business surface.'
  tags:
  - Apache Guacamole
  - Active Connections
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_GUACAMOLE_API_KEY: APACHE_GUACAMOLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-active-connections
    baseUri: http://localhost:8080/guacamole
    description: Apache Guacamole REST API — Active Connections business capability. Self-contained, no shared references.
    resources:
    - name: api-session-data-dataSource-activeConnections
      path: /api/session/data/{dataSource}/activeConnections
      operations:
      - name: listactiveconnections
        method: GET
        description: Apache Guacamole List Active Connections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dataSource
          in: path
          type: string
          description: The data source identifier
          required: true
        - name: Guacamole-Token
          in: header
          type: string
          description: Authentication token
          required: true
    authentication:
      type: apikey
      key: Guacamole-Token
      value: '{{env.APACHE_GUACAMOLE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rest-active-connections-rest
    port: 8080
    description: REST adapter for Apache Guacamole REST API — Active Connections. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/session/data/{datasource}/activeconnections
      name: api-session-data-datasource-activeconnections
      description: REST surface for api-session-data-dataSource-activeConnections.
      operations:
      - method: GET
        name: listactiveconnections
        description: Apache Guacamole List Active Connections
        call: rest-active-connections.listactiveconnections
        with:
          dataSource: rest.dataSource
          Guacamole-Token: rest.Guacamole-Token
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-active-connections-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache Guacamole REST API — Active Connections. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: apache-guacamole-list-active-connections
      description: Apache Guacamole List Active Connections
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-active-connections.listactiveconnections
      with:
        dataSource: tools.dataSource
        Guacamole-Token: tools.Guacamole-Token
      outputParameters:
      - type: object
        mapping: $.
